<!DOCTYPE html>
<html>

<head>

<title>Creature Cards Game</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>Creature Cards</h1>


<a href="index.html">
<button>⬅ Back</button>
</a>



<div class="ccPanel">

<h2>Profile</h2>

<p>
Username:
<span id="username"></span>
</p>


<p>
Money:
<span id="money">0</span> CC
</p>


<button onclick="claimStarter()">
🎁 Free Pack
</button>


<button onclick="buyPack()">
📦 Buy Pack (100 CC)
</button>


</div>





<div id="adminPanel" class="ccPanel">


<h2>
Admin Console
</h2>


<p>
Commands:
</p>


<p>
/resetcards user
<br>
/resetmoney user
<br>
/resetplayer user
<br>
/give user amount
<br>
/job name reward
<br>
/deletejob name
<br>
/announce text
</p>



<input
id="adminCommand"
placeholder="Enter command">



<button onclick="runAdminCommand()">
Run
</button>



<p id="adminResult"></p>


</div>






<div class="ccPanel">

<h2>
Jobs
</h2>

<div id="jobs"></div>

</div>





<div class="ccPanel">

<h2>
Cards
</h2>

<div id="cards" class="cardGrid"></div>

</div>





<script src="game.js"></script>


</body>

</html>
