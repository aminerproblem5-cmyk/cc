<!DOCTYPE html>

<html>

<head>

<title>Creature Cards Game</title>

<link rel="stylesheet" href="style.css">

</head>


<body>



<div class="ccHeader">

<h1>
Creature Cards Game
</h1>


<a href="index.html">

<button>
⬅ Back
</button>

</a>


</div>





<div class="ccPanel">


<h2>
Profile
</h2>


<p>
Player:
<b id="username"></b>
</p>


<p>
Money:
<b id="money">0</b>
CC
</p>



<button onclick="claimStarter()">

🎁 Free Pack

</button>


<button onclick="buyPack()">

📦 Buy Pack (100 CC)

</button>


</div>







<div id="adminPanel" class="ccPanel">


<h2>
Admin Job Creator
</h2>


<input id="newJob"
placeholder="Job name">


<input id="newReward"
placeholder="Reward">



<button onclick="createJob()">

Create Job

</button>


</div>








<div class="ccPanel">


<h2>
Jobs
</h2>


<div id="jobs">

</div>


</div>









<div class="ccPanel">


<h2>
Collection
</h2>


<div id="cards" class="cardGrid">

</div>


</div>






<script src="game.js"></script>


<script>


if(localStorage.getItem("CCrole")!="admin"){


document.getElementById(
"adminPanel"
).style.display="none";


}



</script>


</body>

</html>
