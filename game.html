<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creature Cards - Game</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="ccHeader">

<h1>
Creature Cards
</h1>

<p>
The CC Game Zone
</p>


<a href="index.html">

<button class="ccButton">
⬅ Back to Index
</button>

</a>


</div>





<!-- PLAYER PANEL -->

<div class="ccPanel">


<h2>
Player Profile
</h2>


<p>
Username:
<b id="username">
Loading...
</b>
</p>



<p>
CC Coins:
<b id="money">
0
</b>
</p>



<button class="ccButton" onclick="claimStarter()">

🎁 Claim Free Starter Pack

</button>



<button class="ccButton" onclick="buyPack()">

📦 Open Pack (100 CC)

</button>



</div>







<!-- ADMIN PANEL -->


<div id="adminPanel" class="ccPanel">


<h2>
Admin Job Creator
</h2>



<p>
Create jobs for players to earn CC.
</p>



<input 
id="newJob"
placeholder="Job name">



<input
id="newReward"
placeholder="Reward amount">



<br><br>


<button class="ccButton" onclick="createJob()">

Create Job

</button>



</div>








<!-- JOBS -->


<div class="ccPanel">


<h2>
Available Jobs
</h2>


<div id="jobs">

<p>
Loading jobs...
</p>


</div>


</div>








<!-- COLLECTION -->


<div class="ccPanel">


<h2>
Your Creature Collection
</h2>


<p>
Duplicates are allowed.
</p>



<div id="cards" class="cardGrid">


<p>
No cards yet.
</p>


</div>



</div>







<script src="game.js"></script>



<script>


// Hide admin tools for normal players


if(
localStorage.getItem("CCrole")
!=="admin"

){

document.getElementById(
"adminPanel"
).style.display="none";


}



</script>



</body>

</html>
