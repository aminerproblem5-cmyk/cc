<!DOCTYPE html>
<html>

<head>

<title>CC Game</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<h1>Creature Cards Game</h1>


<a href="index.html">
<button>
⬅ Back to Index
</button>
</a>



<div class="card">

<h2>Profile</h2>

<p>
Player:
<b id="username"></b>
</p>

<p>
Money:
<b id="money">0</b> CC
</p>


<button onclick="claimStarter()">
Free Starter Pack
</button>


<button onclick="buyPack()">
Buy Pack (100 CC)
</button>


</div>





<div id="adminPanel" class="card">

<h2>Admin Jobs</h2>

<input id="newJob"
placeholder="Job name">


<input id="newReward"
placeholder="Reward">


<button onclick="createJob()">
Create Job
</button>

</div>





<h2>Jobs</h2>

<div id="jobs"></div>





<h2>Your Cards</h2>

<div id="cards">

</div>




<script src="game.js"></script>

</body>

</html>
