<!DOCTYPE html>
<html>

<head>

<title>CC Admin Panel</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>
Creature Cards Admin Panel
</h1>


<div class="card">


<h2>Add Card</h2>


<input id="name"
placeholder="Card name">


<input id="type"
placeholder="Type">


<input id="strength"
placeholder="Strength">


<input id="speed"
placeholder="Speed">


<input id="rarity"
placeholder="Rarity">


<button onclick="addCard()">
Add Card
</button>


</div>



<div class="card">

<h2>Users</h2>

<div id="users"></div>

</div>



<script src="admin.js"></script>


</body>

</html>
